<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RF Toolkit">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/814/814513.png">
    <title>RF Toolkit - Map Distance Tool</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Global UI Reset */
        * { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        body, html { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; background: #000; }

        /* Map Layers & Theming */
        #map-container { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
        #map { width: 100%; height: 100%; background: #020617; transition: filter 0.5s ease; }
        #map.dark-theme { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* Floating HUD Widgets & Drag Logic */
        .hud-widget { position: absolute; z-index: 100; pointer-events: auto; transition: opacity 0.4s ease, transform 0.4s ease; }
        .is-dragging { transition: none !important; opacity: 0.95; transform: scale(1.02); z-index: 999; }
        .drag-handle { cursor: grab; touch-action: none; }
        .drag-handle:active { cursor: grabbing; }

        /* Glassmorphism Design System */
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .input-sleek {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.3s ease;
        }
        .input-sleek:focus { outline: none; border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2); }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-toast-in { animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .flowing-line { animation: flowLine 2s linear infinite; }
        @keyframes flowLine { to { stroke-dashoffset: -20; } }

        /* Sidebar Logic */
        #sidebar { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; z-index: 1001; }
        .sidebar-collapsed { transform: translateX(-110%); opacity: 0; }
        #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        /* Background Visuals */
        .aurora-bg { background: #020617; position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .aurora-bg::before {
            content: ''; position: absolute; width: 150vmax; height: 150vmax; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: conic-gradient(from 0deg, transparent 0%, rgba(79, 70, 229, 0.1) 25%, transparent 50%, rgba(147, 51, 234, 0.1) 75%, transparent 100%);
            animation: rotate 40s linear infinite;
        }
        @keyframes rotate { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .pure-black .aurora-bg { background: #000; }
        .pure-black .aurora-bg::before { display: none; }
        
        #custom-modal { position: fixed; inset: 0; z-index: 5000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Search Results Styles */
        #search-results { max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body id="body" class="text-slate-200">

    <div class="aurora-bg transition-colors duration-1000"></div>
    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-[2000] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Modal -->
    <div id="custom-modal">
        <div class="glass-panel p-8 rounded-[2.5rem] w-full max-w-xs text-center space-y-6">
            <div class="w-16 h-16 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto border border-indigo-500/20">
                <i data-lucide="help-circle" class="w-8 h-8 text-indigo-400"></i>
            </div>
            <div>
                <h3 class="text-lg font-bold text-white uppercase tracking-widest text-sm">Reset Map Tool?</h3>
                <p class="text-xs text-slate-400 mt-2 leading-relaxed">Clear the map and start a new spatial analysis?</p>
            </div>
            <div class="flex gap-3">
                <button onclick="hideModal()" class="flex-1 py-3 rounded-2xl bg-white/5 hover:bg-white/10 text-[10px] font-bold uppercase tracking-widest transition-all">Cancel</button>
                <button id="modal-confirm" class="flex-1 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-[10px] font-bold uppercase tracking-widest shadow-lg">Reset</button>
            </div>
        </div>
    </div>

    <!-- MAIN MENU BUTTON (Top Left) -->
    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1100] glass-panel w-12 h-12 md:w-14 md:h-14 rounded-2xl text-white hover:bg-white/10 transition-all active:scale-90 shadow-2xl flex items-center justify-center">
        <i data-lucide="menu" id="menu-icon" class="w-5 h-5 md:w-6 md:h-6"></i>
    </button>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 sidebar-collapsed flex flex-col glass-panel border-r border-white/10 shadow-[40px_0_60px_rgba(0,0,0,0.6)]">
        <div class="p-8 pt-24 flex items-center space-x-3 border-b border-white/5 shrink-0">
            <div class="bg-indigo-500/20 border border-indigo-500/30 p-2.5 rounded-xl"><i data-lucide="radio-tower" class="w-6 h-6 text-indigo-400"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-white uppercase">RF Toolkit</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <button onclick="switchView('map')" class="nav-btn w-full flex items-center space-x-3 px-4 py-4 rounded-2xl transition-all text-slate-400 hover:text-white hover:bg-white/10 bg-indigo-500/20 text-white shadow-inner" id="nav-btn-map">
                <i data-lucide="map" class="w-5 h-5"></i><span class="font-medium">Map Distance Tool</span>
            </button>
            <div class="h-px bg-white/5 my-4"></div>
            <button onclick="switchView('settings')" class="nav-btn w-full flex items-center space-x-3 px-4 py-4 rounded-2xl transition-all text-slate-400 hover:text-white hover:bg-white/10" id="nav-btn-settings">
                <i data-lucide="settings" class="w-5 h-5"></i><span class="font-medium">Settings</span>
            </button>
        </nav>
    </aside>

    <main id="main-content" class="w-full h-full relative">
        
        <!-- View 1: MAP HUD -->
        <div id="view-map" class="view-section absolute inset-0 w-full h-full flex transition-opacity duration-500">
            <div id="map-container"><div id="map" class="dark-theme"></div></div>
            
            <!-- HUD ELEMENTS OVERLAY -->
            <div class="absolute inset-0 pointer-events-none p-4 md:p-6 flex flex-col h-full w-full">

                <!-- RIGHT COMMAND COLUMN -->
                <div class="absolute top-6 right-4 md:right-6 flex flex-col gap-2 z-[200] pointer-events-auto">
                    <button onclick="toggleMapLayer()" id="hud-toggle-layer" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-white hover:bg-white/10" title="Toggle Satellite">
                        <i data-lucide="layers" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>
                    
                    <button onclick="locateUser()" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-white hover:bg-white/10" title="Locate Me">
                        <i data-lucide="navigation" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>

                    <button onclick="toggleSiteLock()" id="hud-toggle-lock" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-white hover:bg-white/10" title="Anchor Point 1 as Site">
                        <i data-lucide="anchor" id="lock-icon" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>
                    
                    <div class="relative">
                        <button onclick="toggleBandSelector()" id="hud-toggle-band" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-white hover:bg-white/10" title="Frequency Band for FSPL">
                            <i data-lucide="radio" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                        <!-- Band Selector Flyout -->
                        <div id="band-selector-panel" class="hidden absolute right-[115%] top-0 w-52 md:w-56 glass-panel p-3 md:p-4 rounded-2xl border-indigo-500/30 shadow-2xl z-[200]">
                            <label class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest block mb-2">Select Band (FSPL)</label>
                            <select id="map-band-select" onchange="updateMapFSPL(); toggleBandSelector();" class="w-full bg-black/40 border border-white/10 rounded-lg py-2 px-2 text-[10px] md:text-[11px] font-bold text-white focus:outline-none transition-all cursor-pointer">
                                <option value="800">LTE B20 (800 MHz)</option>
                                <option value="900">GSM (900 MHz)</option>
                                <option value="1800" selected>LTE B3 (1800 MHz)</option>
                                <option value="2100">UMTS (2100 MHz)</option>
                                <option value="2600">LTE B7 (2600 MHz)</option>
                                <option value="3500">5G NR (3.5 GHz)</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="swapPoints()" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-white hover:bg-white/10" title="Swap Direction (P1 <-> P2)">
                        <i data-lucide="arrow-down-up" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>

                    <button onclick="toggleCoordinateHUD()" id="hud-toggle-inspect" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-white hover:bg-white/10" title="Point Info">
                        <i data-lucide="info" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>

                    <button onclick="clearMap(event)" class="glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-red-400 hover:text-white bg-red-500/10 hover:bg-red-600 border border-red-500/30" title="Delete/Reset">
                        <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>
                </div>

                <!-- DRAGGABLE HUD: Analysis Results (Floating Left of Command Column) -->
                <div id="map-result-box" class="hidden hud-widget top-6 right-16 md:right-[5.5rem] w-40 md:w-52 animate-fade-in z-[150]">
                    <div class="glass-panel p-4 md:p-5 rounded-[2rem] flex flex-col gap-3 shadow-2xl border-indigo-500/30 pointer-events-auto">
                        <div class="drag-handle absolute top-0 left-0 right-0 h-6 flex justify-center items-center opacity-50 hover:opacity-100 transition-opacity" id="drag-handle-results">
                            <div class="w-8 h-1 bg-white/30 rounded-full"></div>
                        </div>
                        <div class="text-center space-y-1 mt-2">
                            <p class="text-[8px] md:text-[9px] text-slate-400 font-bold uppercase tracking-widest">Distance</p>
                            <p id="map-dist-res" class="text-xl md:text-3xl font-black text-white tracking-tighter truncate">-</p>
                            <p id="map-az-res" class="text-xs md:text-sm font-black text-teal-400">-</p>
                        </div>
                        <div class="h-px bg-white/10"></div>
                        <div class="space-y-1 text-center">
                            <p class="text-[7px] md:text-[8px] text-slate-400 font-bold uppercase tracking-widest">FSPL <span id="current-band-display" class="text-indigo-400">(1800 MHz)</span></p>
                            <p id="map-fspl-res" class="text-sm md:text-xl font-black text-indigo-300 tracking-tight">- dB</p>
                        </div>
                    </div>
                </div>

                <!-- DRAGGABLE HUD: Inspector Panels -->
                <div id="hud-point-panels" class="hidden hud-widget top-24 left-4 md:left-6 w-[calc(100%-5rem)] md:w-80 animate-fade-in z-[150]">
                    <div class="glass-panel rounded-[2rem] border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col pointer-events-auto">
                        <div class="drag-handle w-full bg-white/5 py-2 flex items-center justify-center border-b border-white/5" id="drag-handle-inspector">
                            <i data-lucide="grip-horizontal" class="w-4 h-4 text-slate-500"></i>
                        </div>
                        <div class="p-5 md:p-6 space-y-4">
                            <div class="flex items-center justify-between mb-1">
                                 <h2 class="text-[10px] font-black text-white uppercase tracking-[0.2em]">Coordinates</h2>
                                 <button onclick="toggleCoordinateHUD()" class="md:hidden p-1 text-slate-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                            </div>
                            <div class="space-y-4">
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between"><h3 class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">Point 1 (Origin)</h3><span class="text-[8px] text-slate-500 p-type-label uppercase font-black">GEO</span></div>
                                    <div id="map-p1-inputs" class="flex flex-col gap-2"></div>
                                </div>
                                <div class="h-px bg-white/5 my-2"></div>
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between"><h3 class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">Point 2 (Target)</h3><span class="text-[8px] text-slate-500 p-type-label uppercase font-black">GEO</span></div>
                                    <div id="map-p2-inputs" class="flex flex-col gap-2"></div>
                                </div>
                            </div>
                            <button onclick="calculateMapDistance()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3.5 rounded-xl shadow-xl text-[10px] uppercase tracking-[0.2em] active:scale-95 transition-all mt-2">
                                Apply Sync
                            </button>
                        </div>
                    </div>
                </div>

                <!-- BOTTOM CENTER: Search Bar -->
                <div class="absolute bottom-6 left-4 right-4 md:left-1/2 md:transform md:-translate-x-1/2 md:w-[32rem] z-[100] pointer-events-none flex flex-col justify-end items-center">
                    <div class="w-full relative pointer-events-auto">
                        <!-- Search Results Dropdown (Opens UP) -->
                        <div id="search-results" class="hidden glass-panel absolute bottom-full left-0 right-0 mb-2 rounded-2xl border-white/10 shadow-2xl max-h-60 overflow-y-auto animate-fade-in flex-col-reverse"></div>
                        <!-- Search Input -->
                        <div class="glass-panel flex items-center p-1.5 rounded-2xl shadow-2xl border-white/20">
                            <div class="pl-4 text-slate-500"><i data-lucide="search" class="w-4 h-4"></i></div>
                            <input type="text" id="map-search-input" placeholder="Search address or location..." class="flex-1 bg-transparent border-none outline-none text-sm py-2.5 px-3 text-white placeholder-slate-500" onkeyup="handleSearchKeyUp(event)">
                            <button onclick="clearSearch()" id="clear-search-btn" class="hidden p-2 text-slate-500 hover:text-white transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- View 2: SETTINGS (Standard View) -->
        <div id="standard-view-container" class="hidden absolute inset-0 w-full h-full flex items-center justify-center p-6 z-[200] overflow-y-auto">
            <div id="view-settings" class="view-section hidden flex-col w-full max-w-lg">
                <div class="glass-panel p-8 md:p-12 rounded-[3rem] space-y-8 shadow-2xl mt-12 md:mt-0">
                    <h3 class="text-xl md:text-2xl font-black text-white tracking-tight uppercase border-b border-white/5 pb-4">Settings</h3>
                    
                    <div class="space-y-6">
                        <!-- Coordinate Format -->
                        <div class="space-y-4">
                            <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Coordinate Format</p>
                            <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5 h-12 md:h-14 relative overflow-hidden">
                                <div id="settings-toggle-bg" class="absolute inset-y-1.5 left-1.5 w-[calc(50%-4px)] bg-indigo-500/20 rounded-xl transition-transform duration-500"></div>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="coord-pref" value="GEO" checked onchange="updateCoordPref()" class="peer sr-only"><span class="peer-checked:text-white text-slate-500 uppercase">GEO</span>
                                </label>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="coord-pref" value="UTM" onchange="updateCoordPref()" class="peer sr-only"><span class="peer-checked:text-white text-slate-500 uppercase">UTM</span>
                                </label>
                            </div>
                        </div>

                        <!-- Distance Units -->
                        <div class="space-y-4">
                            <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Distance Units</p>
                            <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5 h-12 md:h-14 relative overflow-hidden">
                                <div id="units-toggle-bg" class="absolute inset-y-1.5 left-1.5 w-[calc(50%-4px)] bg-indigo-500/20 rounded-xl transition-transform duration-500"></div>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="unit-pref" value="METRIC" checked onchange="updateUnitPref()" class="peer sr-only"><span class="peer-checked:text-white text-slate-500 uppercase">Metric (m/km)</span>
                                </label>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="unit-pref" value="IMPERIAL" onchange="updateUnitPref()" class="peer sr-only"><span class="peer-checked:text-white text-slate-500 uppercase">Imperial (ft/mi)</span>
                                </label>
                            </div>
                        </div>

                        <!-- Dark Mode -->
                        <div class="flex items-center justify-between p-4 md:p-6 bg-black/40 rounded-[2rem] border border-white/5 shadow-inner">
                            <div class="flex items-center space-x-4">
                                <div class="p-3 bg-slate-800 rounded-2xl shadow-lg"><i data-lucide="moon" class="w-5 h-5 text-slate-300"></i></div>
                                <div><p class="font-bold text-white text-sm">OLED Mode</p><p class="text-[10px] text-slate-500 mt-1 leading-none font-bold uppercase tracking-tighter">Save Power</p></div>
                            </div>
                            <input type="checkbox" id="dark-mode-toggle" onchange="toggleTheme()" class="w-10 h-5">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let sidebarOpen = false;
        let coordPref = 'GEO';
        let unitPref = 'METRIC';
        let currentDist = 0;
        let mapInit = false;
        let map, p1M, p2M, poly, points = [], searchM = null, userLocM = null;
        let currentLayerMode = 'map';
        let isSiteLocked = false;

        // Custom Circle Markers
        const m1I = L.divIcon({ className: '', html: `<div class="relative flex justify-center items-center"><div class="absolute -top-6 text-[9px] font-black text-white bg-indigo-600 px-1.5 py-0.5 rounded-md shadow-lg border border-white/20 leading-none">P1</div><div style="background-color: #6366f1; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #000; box-shadow: 0 0 10px #6366f1;"></div></div>`, iconAnchor: [7, 7] });
        const m2I = L.divIcon({ className: '', html: `<div class="relative flex justify-center items-center"><div class="absolute -top-6 text-[9px] font-black text-white bg-emerald-500 px-1.5 py-0.5 rounded-md shadow-lg border border-white/20 leading-none">P2</div><div style="background-color: #10b981; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #000; box-shadow: 0 0 10px #10b981;"></div></div>`, iconAnchor: [7, 7] });
        const siteI = L.divIcon({ className: '', html: `<div class="relative flex justify-center items-center"><div class="absolute -top-6 text-[9px] font-black text-white bg-orange-500 px-1.5 py-0.5 rounded-md shadow-lg border border-white/20 leading-none">SITE</div><div style="background-color: #f97316; width: 16px; height: 16px; border-radius: 50%; border: 2.5px solid #000; box-shadow: 0 0 12px #f97316;"></div></div>`, iconAnchor: [8, 8] });

        const mapLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
        const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' });

        // Great Circle Math for accurate bending vectors
        function getGreatCirclePoints(lat1, lon1, lat2, lon2, numPoints = 100) {
            const pts = [];
            const d2r = Math.PI / 180, r2d = 180 / Math.PI;
            const phi1 = lat1 * d2r, lambda1 = lon1 * d2r;
            const phi2 = lat2 * d2r, lambda2 = lon2 * d2r;
            const u = Math.sin((phi2 - phi1) / 2), v = Math.sin((lambda2 - lambda1) / 2);
            const a = u * u + Math.cos(phi1) * Math.cos(phi2) * v * v;
            const d = 2 * Math.asin(Math.sqrt(a));
            if (d === 0) return [[lat1, lon1], [lat2, lon2]];
            for (let i = 0; i <= numPoints; i++) {
                const f = i / numPoints;
                const A = Math.sin((1 - f) * d) / Math.sin(d);
                const B = Math.sin(f * d) / Math.sin(d);
                const x = A * Math.cos(phi1) * Math.cos(lambda1) + B * Math.cos(phi2) * Math.cos(lambda2);
                const y = A * Math.cos(phi1) * Math.sin(lambda1) + B * Math.cos(phi2) * Math.sin(lambda2);
                const z = A * Math.sin(phi1) + B * Math.sin(phi2);
                const phi = Math.atan2(z, Math.sqrt(x * x + y * y));
                const lambda = Math.atan2(y, x);
                pts.push([phi * r2d, lambda * r2d]);
            }
            return pts;
        }

        function makeDraggable(elmnt, header) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (header) { header.onmousedown = dragMouseDown; header.ontouchstart = dragMouseDown; }
            function dragMouseDown(e) {
                e = e || window.event;
                if(e.type === 'touchstart') { pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; }
                else { pos3 = e.clientX; pos4 = e.clientY; }
                document.onmouseup = closeDragElement; document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag; document.ontouchmove = elementDrag;
                elmnt.classList.add('is-dragging');
            }
            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                let cX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let cY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - cX; pos2 = pos4 - cY; pos3 = cX; pos4 = cY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
                document.ontouchend = null; document.ontouchmove = null;
                elmnt.classList.remove('is-dragging');
            }
        }

        window.onload = function() {
            makeDraggable(document.getElementById("hud-point-panels"), document.getElementById("drag-handle-inspector"));
            makeDraggable(document.getElementById("map-result-box"), document.getElementById("drag-handle-results"));
        };

        function toggleSidebar() {
            const s = document.getElementById('sidebar'), o = document.getElementById('sidebar-overlay'), i = document.getElementById('menu-icon');
            sidebarOpen = !sidebarOpen;
            s.classList.toggle('sidebar-collapsed', !sidebarOpen);
            o.classList.toggle('active', sidebarOpen);
            i.setAttribute('data-lucide', sidebarOpen ? 'x' : 'menu');
            lucide.createIcons();
        }

        function showToast(m, t='success') {
            const c = document.getElementById('toast-container'), el = document.createElement('div');
            el.className = `${t === 'error' ? 'bg-red-500/90' : (t === 'info' ? 'bg-orange-500/90' : 'bg-indigo-500/90')} backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center space-x-3 animate-toast-in border border-white/20`;
            let iconStr = t === 'error' ? 'alert-circle' : (t === 'info' ? 'anchor' : 'check-circle-2');
            el.innerHTML = `<i data-lucide="${iconStr}" class="w-4 h-4"></i><span class="font-bold text-[10px] uppercase tracking-widest text-white">${m}</span>`;
            c.appendChild(el); lucide.createIcons({root: el});
            setTimeout(() => el.remove(), 2500);
        }

        function switchView(v) {
            if (sidebarOpen) toggleSidebar();
            document.querySelectorAll('.view-section').forEach(e => { e.classList.add('hidden'); e.classList.remove('flex'); });
            const sc = document.getElementById('standard-view-container');
            
            if (v === 'map') {
                sc.classList.add('hidden');
                document.getElementById('view-map').classList.remove('hidden');
                document.getElementById('view-map').classList.add('flex');
                if (map) setTimeout(() => map.invalidateSize(), 300);
            } else {
                sc.classList.remove('hidden');
                const t = document.getElementById(`view-${v}`);
                if (t) { t.classList.remove('hidden'); t.classList.add('flex'); }
            }

            document.querySelectorAll('.nav-btn').forEach(e => {
                e.classList.remove('bg-indigo-500/20', 'text-white', 'shadow-inner');
                e.classList.add('text-slate-400');
            });
            const b = document.getElementById(`nav-btn-${v}`);
            if(b) { b.classList.remove('text-slate-400'); b.classList.add('bg-indigo-500/20', 'text-white', 'shadow-inner'); }
            if (v === 'map' && !mapInit) { initMap(); mapInit = true; }
        }

        // --- SEARCH ---
        let sT;
        function handleSearchKeyUp(e) {
            const v = e.target.value.trim();
            document.getElementById('clear-search-btn').classList.toggle('hidden', v.length === 0);
            if (e.key === 'Enter') searchPlaces(v); else { clearTimeout(sT); sT = setTimeout(() => searchPlaces(v), 700); }
        }
        function clearSearch() {
            document.getElementById('map-search-input').value = '';
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('clear-search-btn').classList.add('hidden');
            if (searchM) map.removeLayer(searchM);
        }
        async function searchPlaces(q) {
            if (q.length < 3) { document.getElementById('search-results').classList.add('hidden'); return; }
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`);
                const d = await r.json();
                const c = document.getElementById('search-results');
                if (!d || d.length === 0) { c.classList.add('hidden'); return; }
                c.innerHTML = d.map(x => `
                    <div class="px-5 py-4 hover:bg-white/10 cursor-pointer border-b border-white/5 last:border-none transition-colors" onclick="goTo(${x.lat}, ${x.lon}, '${x.display_name.replace(/'/g, "\\'")}')">
                        <p class="text-xs font-black text-white truncate uppercase tracking-tighter">${x.display_name.split(',')[0]}</p>
                        <p class="text-[9px] text-slate-500 truncate uppercase">${x.display_name.split(',').slice(1).join(',')}</p>
                    </div>`).join('');
                c.classList.remove('hidden');
            } catch (err) {}
        }
        function goTo(la, lo, n) {
            map.setView([la, lo], 15);
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('map-search-input').value = n.split(',')[0];
            if (searchM) map.removeLayer(searchM);
            searchM = L.circleMarker([la, lo], { radius: 12, color: '#818cf8', fillColor: '#818cf8', fillOpacity: 0.4 }).addTo(map);
            setTimeout(() => { if(searchM) map.removeLayer(searchM); }, 4000);
        }

        // --- MAP TOOLS ---
        function toggleMapLayer() {
            if (currentLayerMode === 'map') {
                map.removeLayer(mapLayer); satLayer.addTo(map);
                document.getElementById('map').classList.remove('dark-theme');
                document.getElementById('hud-toggle-layer').classList.add('bg-indigo-600');
                currentLayerMode = 'sat'; showToast('Satellite Active');
            } else {
                map.removeLayer(satLayer); mapLayer.addTo(map);
                document.getElementById('map').classList.add('dark-theme');
                document.getElementById('hud-toggle-layer').classList.remove('bg-indigo-600');
                currentLayerMode = 'map'; showToast('Map Active');
            }
        }

        function locateUser() {
            showToast('Acquiring location...', 'success');
            map.locate({setView: true, maxZoom: 15});
            map.once('locationfound', function(e) {
                if (userLocM) map.removeLayer(userLocM);
                userLocM = L.circleMarker(e.latlng, { radius: 8, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);
                showToast('Location Acquired');
            });
            map.once('locationerror', function(e) { showToast('GPS Denied', 'error'); });
        }

        function toggleCoordinateHUD() {
            const h = document.getElementById('hud-point-panels');
            const v = !h.classList.contains('hidden');
            h.classList.toggle('hidden', v);
            document.getElementById('hud-toggle-inspect').classList.toggle('bg-indigo-600', !v);
        }

        function toggleBandSelector() {
            const p = document.getElementById('band-selector-panel');
            p.classList.toggle('hidden');
            document.getElementById('hud-toggle-band').classList.toggle('bg-indigo-600', !p.classList.contains('hidden'));
        }

        function toggleSiteLock() {
            if (isSiteLocked) {
                isSiteLocked = false;
                document.getElementById('hud-toggle-lock').classList.remove('bg-indigo-600');
                document.getElementById('lock-icon').setAttribute('data-lucide', 'anchor');
                if (p1M) p1M.setIcon(m1I);
                lucide.createIcons();
                showToast('Site Lock Disabled');
            } else {
                if (points.length === 0) {
                    showToast('Drop a pin to set as Site', 'error');
                    return;
                }
                isSiteLocked = true;
                document.getElementById('hud-toggle-lock').classList.add('bg-indigo-600');
                document.getElementById('lock-icon').setAttribute('data-lucide', 'lock');
                if (p1M) p1M.setIcon(siteI);
                lucide.createIcons();
                showToast('Site Locked (Origin)', 'info');
            }
        }

        function updateCoordPref() {
            coordPref = document.querySelector('input[name="coord-pref"]:checked').value;
            const b = document.getElementById('settings-toggle-bg');
            if(b) b.style.transform = coordPref === 'GEO' ? 'translateX(0)' : 'translateX(100%)';
            document.querySelectorAll('.p-type-label').forEach(el => el.innerText = coordPref);
            const p1c = document.getElementById('map-p1-inputs'), p2c = document.getElementById('map-p2-inputs');
            if (coordPref === 'GEO') {
                p1c.innerHTML = `<input type="number" id="p1-lat" oninput="sMap(1)" placeholder="Latitude" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"><input type="number" id="p1-lon" oninput="sMap(1)" placeholder="Longitude" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase">`;
                p2c.innerHTML = `<input type="number" id="p2-lat" oninput="sMap(2)" placeholder="Latitude" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"><input type="number" id="p2-lon" oninput="sMap(2)" placeholder="Longitude" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase">`;
            } else {
                p1c.innerHTML = `<input type="text" id="p1-zone" oninput="sMap(1)" placeholder="Zone" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"><div class="grid grid-cols-2 gap-2"><input type="number" id="p1-east" oninput="sMap(1)" placeholder="E" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"><input type="number" id="p1-north" oninput="sMap(1)" placeholder="N" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"></div>`;
                p2c.innerHTML = `<input type="text" id="p2-zone" oninput="sMap(2)" placeholder="Zone" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"><div class="grid grid-cols-2 gap-2"><input type="number" id="p2-east" oninput="sMap(2)" placeholder="E" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"><input type="number" id="p2-north" oninput="sMap(2)" placeholder="N" class="input-sleek px-4 py-2.5 rounded-2xl text-xs uppercase"></div>`;
            }
            if (points.length > 0) rHUD();
        }

        function updateUnitPref() {
            unitPref = document.querySelector('input[name="unit-pref"]:checked').value;
            const b = document.getElementById('units-toggle-bg');
            if(b) b.style.transform = unitPref === 'METRIC' ? 'translateX(0)' : 'translateX(100%)';
            if (points.length === 2) calculateMapDistance();
        }

        function swapPoints() {
            if (points.length < 2) { showToast('Need 2 points to swap', 'error'); return; }
            
            const temp = points[0];
            points[0] = points[1];
            points[1] = temp;
            
            if(p1M) map.removeLayer(p1M);
            if(p2M) map.removeLayer(p2M);
            
            p1M = L.marker([points[0].lat, points[0].lng], {icon: isSiteLocked ? siteI : m1I}).addTo(map);
            p2M = L.marker([points[1].lat, points[1].lng], {icon: m2I}).addTo(map);
            
            rVec();
            rHUD();
            showToast('Direction Swapped');
        }

        function sMap(n, isTargetLockOverride = false) {
            if(isTargetLockOverride) {
                points[1] = getC(2) || points[1]; // fallback if manual logic triggered it
                if(p2M) map.removeLayer(p2M);
                p2M = L.marker([points[1].lat, points[1].lng], {icon: m2I}).addTo(map);
                rVec(); rHUD(); return;
            }

            const l = getC(n); if (!l) return;
            points[n-1] = l;
            const mk = n === 1 ? p1M : p2M; if (mk) map.removeLayer(mk);
            const iconToUse = n === 1 ? (isSiteLocked ? siteI : m1I) : m2I;
            const m = L.marker([l.lat, l.lng], {icon: iconToUse}).addTo(map);
            
            if (n === 1) p1M = m; else p2M = m;
            if (points.length === 2) rVec();
        }

        function getC(n) {
            if (coordPref === 'GEO') {
                const la = parseFloat(document.getElementById(`p${n}-lat`).value), lo = parseFloat(document.getElementById(`p${n}-lon`).value);
                return (!isNaN(la) && !isNaN(lo)) ? {lat: la, lng: lo} : null;
            } else {
                const zi = document.getElementById(`p${n}-zone`); if(!zi) return null;
                const z = zi.value.toUpperCase().trim(), e = parseFloat(document.getElementById(`p${n}-east`).value), na = parseFloat(document.getElementById(`p${n}-north`).value);
                if (!z || isNaN(e) || isNaN(na)) return null;
                try {
                    const zN = parseInt(z.match(/\d+/)[0]), iN = !z.includes('S'), p = `+proj=utm +zone=${zN} ${iN ? '' : '+south '}+datum=WGS84 +units=m +no_defs`;
                    proj4.defs(`EPSG:UTM${zN}`, p); const g = proj4(p, 'EPSG:4326', [e, na]);
                    return {lat: g[1], lng: g[0]};
                } catch(err) { return null; }
            }
        }

        function rHUD() {
            points.forEach((p, i) => {
                const n = i+1;
                if (coordPref === 'GEO') {
                    const la = document.getElementById(`p${n}-lat`), lo = document.getElementById(`p${n}-lon`);
                    if(la) la.value = p.lat.toFixed(6); if(lo) lo.value = p.lng.toFixed(6);
                } else {
                    const z = Math.floor((p.lng + 180) / 6) + 1, isN = p.lat >= 0, pStr = `+proj=utm +zone=${z} ${isN ? '' : '+south '}+datum=WGS84 +units=m +no_defs`;
                    proj4.defs(`EPSG:326${z}`, pStr); const u = proj4('EPSG:4326', pStr, [p.lng, p.lat]);
                    const ze = document.getElementById(`p${n}-zone`), ee = document.getElementById(`p${n}-east`), ne = document.getElementById(`p${n}-north`);
                    if(ze) ze.value = `${z}${isN ? 'N' : 'S'}`; if(ee) ee.value = u[0].toFixed(2); if(ne) ne.value = u[1].toFixed(2);
                }
            });
        }

        function rVec() {
            if (poly) map.removeLayer(poly);
            const greatCirclePoints = getGreatCirclePoints(points[0].lat, points[0].lng, points[1].lat, points[1].lng);
            poly = L.polyline(greatCirclePoints, {color: '#818cf8', weight: 4, dashArray: '10, 10', className: 'flowing-line'}).addTo(map);
            calculateMapDistance();
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([32.0853, 34.7818], 12);
            mapLayer.addTo(map);
            map.on('click', onMapClick); map.on('mousedown', () => document.getElementById('search-results').classList.add('hidden'));
            updateCoordPref();
            updateUnitPref();
        }

        function onMapClick(e) {
            if (isSiteLocked) {
                // If site is locked, just update Point 2 immediately without prompts
                points[1] = {lat: e.latlng.lat, lng: e.latlng.lng};
                if (p2M) map.removeLayer(p2M);
                p2M = L.marker([e.latlng.lat, e.latlng.lng], {icon: m2I}).addTo(map);
                rVec(); rHUD();
                return;
            }

            if (points.length >= 2) {
                document.getElementById('custom-modal').style.display = 'flex';
                document.getElementById('modal-confirm').onclick = () => { clearMap(); hideModal(); pushMapPoint(e.latlng.lat, e.latlng.lng); };
                return;
            }
            pushMapPoint(e.latlng.lat, e.latlng.lng);
        }

        function hideModal() { document.getElementById('custom-modal').style.display = 'none'; }
        
        function pushMapPoint(la, lo) {
            points.push({lat: la, lng: lo});
            const iconToUse = points.length === 1 ? (isSiteLocked ? siteI : m1I) : m2I;
            const m = L.marker([la, lo], {icon: iconToUse}).addTo(map);
            
            if (points.length === 1) p1M = m; 
            else { p2M = m; rVec(); map.fitBounds(poly.getBounds(), {padding: [100, 100]}); }
            rHUD();
        }

        function clearMap(e) {
            if(e) e.stopPropagation(); 

            if (isSiteLocked && points.length > 0) {
                // Partial clear (preserve Site)
                points = [points[0]];
                if(p2M) map.removeLayer(p2M); 
                if(poly) map.removeLayer(poly);
                document.getElementById('map-result-box').classList.add('hidden');
                ['p2-lat','p2-lon','p2-zone','p2-east','p2-north'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; });
                showToast('Target Reset (Site Locked)');
            } else {
                // Full Clear
                points = [];
                if(p1M) map.removeLayer(p1M); if(p2M) map.removeLayer(p2M); if(poly) map.removeLayer(poly);
                document.getElementById('map-result-box').classList.add('hidden');
                ['p1-lat','p1-lon','p2-lat','p2-lon','p1-zone','p1-east','p1-north','p2-zone','p2-east','p2-north'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; });
                if (!isSiteLocked) showToast('Map Reset');
            }
        }

        function calculateMapDistance() {
            if (points.length < 2) return;
            const R = 6371e3, f1 = points[0].lat * Math.PI/180, f2 = points[1].lat * Math.PI/180;
            const df = (points[1].lat-points[0].lat) * Math.PI/180, dl = (points[1].lng-points[0].lng) * Math.PI/180;
            const a = Math.sin(df/2) * Math.sin(df/2) + Math.cos(f1) * Math.cos(f2) * Math.sin(dl/2) * Math.sin(dl/2);
            currentDist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            let b = (Math.atan2(Math.sin(dl)*Math.cos(f2), Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl)) * 180 / Math.PI + 360) % 360;
            
            let displayStr = "";
            if (unitPref === 'METRIC') {
                displayStr = currentDist > 1000 ? (currentDist/1000).toFixed(2) + ' km' : currentDist.toFixed(0) + ' m';
            } else {
                let distFt = currentDist * 3.28084;
                displayStr = distFt > 5280 ? (distFt/5280).toFixed(2) + ' mi' : distFt.toFixed(0) + ' ft';
            }

            document.getElementById('map-dist-res').innerText = displayStr;
            document.getElementById('map-az-res').innerText = b.toFixed(1) + '°';
            document.getElementById('map-result-box').classList.remove('hidden'); document.getElementById('map-result-box').classList.add('flex');
            updateMapFSPL();
        }

        function updateMapFSPL() {
            if (currentDist === 0) return;
            const select = document.getElementById('map-band-select');
            const f = parseFloat(select.value);
            const textContent = select.options[select.selectedIndex].text.split('(')[0].trim();
            
            const display = document.getElementById('current-band-display');
            if (display) display.innerText = `(${textContent})`;

            const fspl = 20 * Math.log10(currentDist / 1000) + 20 * Math.log10(f) + 32.44;
            document.getElementById('map-fspl-res').innerText = fspl.toFixed(2) + ' dB';
        }

        function toggleTheme() { document.getElementById('body').classList.toggle('pure-black'); }
        
        switchView('map');

		const manifest = {
			"name": "RF Toolkit Map",
			"short_name": "RF Map",
			"start_url": ".",
			"display": "standalone",
			"background_color": "#020617",
			"theme_color": "#6366f1",
			"icons": [{
				"src": "https://cdn-icons-png.flaticon.com/512/814/814513.png",
				"sizes": "512x512",
				"type": "image/png"
			}]
		};
		const manifestStr = JSON.stringify(manifest);
		const blob = new Blob([manifestStr], {type: 'application/json'});
		const manifestURL = URL.createObjectURL(blob);
		const link = document.createElement('link');
		link.rel = 'manifest';
		link.href = manifestURL;
		document.head.appendChild(link);
    </script>
</body>
