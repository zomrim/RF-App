<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RF Toolkit - Map Distance Tool</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } 
        }
    </script>

    <style>
        /* Global UI Reset */
        * { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        body, html { height: 100dvh; width: 100vw; overflow: hidden; margin: 0; }

        body { background-color: #f8fafc; transition: background-color 0.5s ease; }
        html.dark body { background-color: #000; }

        /* Map Layers */
        #map-container { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
        #map { width: 100%; height: 100%; background: #e2e8f0; transition: background-color 0.5s ease; }
        html.dark #map { background: #020617; }
        
        /* Leaflet Theme Fixes */
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 0; overflow: hidden; }
        html.dark .leaflet-popup-content-wrapper, html.dark .leaflet-popup-tip { background: #1e293b; color: #fff; }
        .leaflet-popup-content { margin: 0 !important; }

        /* Floating HUD Widgets */
        .hud-widget { position: absolute; z-index: 100; pointer-events: auto; transition: opacity 0.4s ease, transform 0.4s ease; }
        .is-dragging { transition: none !important; opacity: 0.95; transform: scale(1.02); z-index: 999; }
        .drag-handle { cursor: grab; touch-action: none; }
        .drag-handle:active { cursor: grabbing; }

        /* Glassmorphism System */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        html.dark .glass-card {
            background: rgba(15, 23, 42, 0.65); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: none;
        }

        .input-sleek { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.1); color: #1e293b; transition: all 0.3s ease; }
        html.dark .input-sleek { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); color: white; }
        .input-sleek:focus { outline: none; border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2); }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-toast-in { animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .flowing-line { animation: flowLine 2s linear infinite; }
        @keyframes flowLine { to { stroke-dashoffset: -20; } }

        /* Sidebar Logic */
        #sidebar { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease; z-index: 1001; }
        .sidebar-collapsed { transform: translateX(-110%); opacity: 0; }
        #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        /* Background Visuals */
        .aurora-bg { background: #f8fafc; position: fixed; inset: 0; z-index: -1; overflow: hidden; transition: background-color 0.5s ease; }
        html.dark .aurora-bg { background: #020617; }
        .aurora-bg::before {
            content: ''; position: absolute; width: 150vmax; height: 150vmax; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: conic-gradient(from 0deg, transparent 0%, rgba(79, 70, 229, 0.05) 25%, transparent 50%, rgba(147, 51, 234, 0.05) 75%, transparent 100%);
            animation: rotate 40s linear infinite;
        }
        html.dark .aurora-bg::before { background: conic-gradient(from 0deg, transparent 0%, rgba(79, 70, 229, 0.1) 25%, transparent 50%, rgba(147, 51, 234, 0.1) 75%, transparent 100%); }
        @keyframes rotate { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        
        #custom-modal { position: fixed; inset: 0; z-index: 5000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #search-results { max-height: 250px; overflow-y: auto; }

        /* Command Button Active State */
        .cmd-btn.active {
            background-color: #4f46e5 !important;
            color: #ffffff !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.5) !important;
        }
        
        .btn-hover-fx { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover-fx:active { transform: scale(0.92); }
    </style>
</head>
<body id="body" class="text-slate-800 dark:text-slate-200">

    <div class="aurora-bg"></div>
    <div id="toast-container" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-[2000] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Confirmation Modal -->
    <div id="custom-modal">
        <div class="glass-panel p-6 md:p-8 rounded-[2.5rem] w-full max-w-xs text-center space-y-6 shadow-2xl relative overflow-hidden">
            <div id="modal-icon-bg" class="w-16 h-16 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto border border-indigo-500/20">
                <i data-lucide="help-circle" id="modal-icon" class="w-8 h-8 text-indigo-600 dark:text-indigo-400"></i>
            </div>
            <div>
                <h3 id="modal-title" class="text-lg font-bold text-slate-800 dark:text-white uppercase tracking-widest text-sm">Reset Map Tool?</h3>
                <p id="modal-desc" class="text-xs text-slate-500 dark:text-slate-400 mt-2 leading-relaxed">Clear the map and start a new spatial analysis?</p>
            </div>
            <div class="flex gap-3">
                <button onclick="hideModal()" class="flex-1 py-3 rounded-2xl bg-black/5 hover:bg-black/10 dark:bg-white/5 dark:hover:bg-white/10 text-slate-700 dark:text-slate-200 text-[10px] font-bold uppercase tracking-widest transition-all">Cancel</button>
                <button id="modal-confirm" class="flex-1 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-bold uppercase tracking-widest shadow-lg transition-all">Reset</button>
            </div>
        </div>
    </div>

    <!-- MAIN MENU BUTTON (Top Left) -->
    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[1100] glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl text-slate-700 dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-all active:scale-90 shadow-xl flex items-center justify-center">
        <i data-lucide="menu" id="menu-icon" class="w-5 h-5 md:w-6 md:h-6"></i>
    </button>

    <!-- LEFT COMMAND COLUMN -->
    <div class="absolute top-20 md:top-24 left-6 flex flex-col gap-2 z-[100] pointer-events-auto">
        <button onclick="toggleMapLayer()" id="hud-toggle-layer" class="cmd-btn btn-hover-fx glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/5 dark:hover:bg-white/10 shadow-lg" title="Toggle Map Layer">
            <i data-lucide="satellite" id="layer-icon" class="w-4 h-4 md:w-5 md:h-5"></i>
        </button>
        
        <button onclick="locateUser()" class="cmd-btn btn-hover-fx glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/5 dark:hover:bg-white/10 shadow-lg" title="Locate Me">
            <i data-lucide="navigation" class="w-4 h-4 md:w-5 md:h-5"></i>
        </button>

        <button onclick="promptClearMap()" class="cmd-btn btn-hover-fx glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl flex items-center justify-center text-red-500 dark:text-red-400 hover:text-white hover:bg-red-500 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 shadow-lg" title="Reset Map">
            <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i>
        </button>
    </div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 sidebar-collapsed flex flex-col glass-panel border-r border-slate-200 dark:border-white/10 shadow-[40px_0_60px_rgba(0,0,0,0.2)] dark:shadow-[40px_0_60px_rgba(0,0,0,0.6)]">
        <div class="p-8 pt-24 flex items-center space-x-3 border-b border-slate-200 dark:border-white/5 shrink-0">
            <div class="bg-indigo-500/10 dark:bg-indigo-500/20 border border-indigo-500/20 dark:border-indigo-500/30 p-2.5 rounded-xl"><i data-lucide="radio-tower" class="w-6 h-6 text-indigo-600 dark:text-indigo-400"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white uppercase">RF Toolkit</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
            <button onclick="switchView('map')" class="nav-btn w-full flex items-center space-x-3 px-4 py-4 rounded-2xl transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10 bg-indigo-500/10 dark:bg-indigo-500/20 text-indigo-700 dark:text-white shadow-inner" id="nav-btn-map">
                <i data-lucide="map" class="w-5 h-5"></i><span class="font-medium">Map Distance Tool</span>
            </button>
            <div class="h-px bg-slate-200 dark:bg-white/5 my-4"></div>
            <button onclick="switchView('settings')" class="nav-btn w-full flex items-center space-x-3 px-4 py-4 rounded-2xl transition-all text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-black/5 dark:hover:bg-white/10" id="nav-btn-settings">
                <i data-lucide="settings" class="w-5 h-5"></i><span class="font-medium">Settings</span>
            </button>
        </nav>
    </aside>

    <main id="main-content" class="w-full h-full relative">
        
        <!-- View 1: MAP HUD -->
        <div id="view-map" class="view-section absolute inset-0 w-full h-full flex transition-opacity duration-500">
            <div id="map-container"><div id="map" class="dark-theme"></div></div>
            
            <div class="absolute inset-0 pointer-events-none p-4 md:p-6 flex flex-col h-full w-full">

                <!-- RIGHT COMMAND COLUMN -->
                <div class="absolute top-6 right-4 md:right-6 flex flex-col items-end gap-2 z-[100] pointer-events-none">
                    <div class="flex flex-col gap-2 pointer-events-auto relative">
                        
                        <!-- Band Selector for FSPL -->
                        <div class="relative">
                            <button onclick="toggleBandSelector()" id="hud-toggle-band" class="cmd-btn btn-hover-fx glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/5 dark:hover:bg-white/10 shadow-lg" title="Frequency Band">
                                <i data-lucide="radio" class="w-4 h-4 md:w-5 md:h-5"></i>
                            </button>
                            <div id="band-selector-panel" class="hidden absolute right-[115%] top-0 w-52 md:w-56 glass-panel p-3 md:p-4 rounded-2xl border-slate-300 dark:border-indigo-500/30 shadow-2xl z-[200]">
                                <label class="text-[9px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest block mb-2">Select Band (FSPL)</label>
                                <select id="map-band-select" onchange="updateMapFSPL(); toggleBandSelector();" class="w-full bg-slate-100 dark:bg-black/40 border border-slate-300 dark:border-white/10 rounded-lg py-2 px-2 text-[11px] font-bold text-slate-800 dark:text-white focus:outline-none transition-all cursor-pointer">
                                    <option value="800">LTE B20 (800 MHz)</option>
                                    <option value="900">GSM (900 MHz)</option>
                                    <option value="1800" selected>LTE B3 (1800 MHz)</option>
                                    <option value="2100">UMTS (2100 MHz)</option>
                                    <option value="2600">LTE B7 (2600 MHz)</option>
                                    <option value="3500">5G NR (3.5 GHz)</option>
                                </select>
                            </div>
                        </div>

                        <button onclick="swapPoints()" class="cmd-btn btn-hover-fx glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/5 dark:hover:bg-white/10 shadow-lg" title="Swap Direction (P1 <-> P2)">
                            <i data-lucide="arrow-down-up" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                        
                        <button onclick="toggleCoordinateHUD()" id="hud-toggle-inspect" class="cmd-btn btn-hover-fx glass-panel w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl transition-all flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/5 dark:hover:bg-white/10 shadow-lg" title="Point Coordinates">
                            <i data-lucide="info" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- DRAGGABLE HUD: Analysis Results -->
                <div id="map-result-box" class="hidden hud-widget top-24 md:top-6 right-20 md:right-[5.5rem] w-44 md:w-48 animate-fade-in z-[150]">
                    <div class="glass-panel rounded-[2rem] border-slate-300 dark:border-indigo-500/30 shadow-2xl overflow-hidden flex flex-col pointer-events-auto">
                        <div class="drag-handle w-full bg-slate-100/50 dark:bg-white/5 py-1.5 flex items-center justify-center border-b border-slate-200 dark:border-white/5" id="drag-handle-results">
                            <i data-lucide="grip-horizontal" class="w-4 h-4 text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <div class="p-4 md:p-5 flex flex-col gap-3">
                            <div class="text-center space-y-1">
                                <p class="text-[9px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">Distance</p>
                                <p id="map-dist-res" class="text-2xl font-black text-slate-800 dark:text-white tracking-tighter truncate">-</p>
                                <p id="map-az-res" class="text-sm font-black text-teal-600 dark:text-teal-400 leading-tight">-</p>
                            </div>
                            <div class="h-px bg-slate-200 dark:bg-white/10"></div>
                            <div class="space-y-1 text-center">
                                <p class="text-[8px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">Path Loss <br><span id="current-band-display" class="text-indigo-600 dark:text-indigo-400">(1800 MHz)</span></p>
                                <p id="map-fspl-res" class="text-lg font-black text-indigo-600 dark:text-indigo-300 tracking-tight">- dB</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DRAGGABLE HUD: Inspector Panels -->
                <div id="hud-point-panels" class="hidden hud-widget top-44 md:top-28 left-4 md:left-6 w-[calc(100%-2rem)] md:w-80 animate-fade-in z-[150]" style="pointer-events: none;">
                    <div class="glass-panel rounded-[2rem] border-slate-300 dark:border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col pointer-events-auto">
                        <div class="drag-handle w-full bg-slate-100/50 dark:bg-white/5 py-2 flex items-center justify-center border-b border-slate-200 dark:border-white/5" id="drag-handle-inspector">
                            <i data-lucide="grip-horizontal" class="w-4 h-4 text-slate-400 dark:text-slate-500"></i>
                        </div>
                        <div class="p-5 md:p-6 space-y-4">
                            <div class="flex items-center justify-between mb-1">
                                 <h2 class="text-[10px] font-black text-slate-800 dark:text-white uppercase tracking-[0.2em]">Coordinate Data</h2>
                                 <button onclick="toggleCoordinateHUD()" class="md:hidden p-1 text-slate-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                            </div>
                            <div class="space-y-4">
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between">
                                        <h3 class="text-[9px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest flex items-center">Point 1 (Origin)</h3>
                                        <span class="text-[8px] text-slate-500 p-type-label uppercase font-black">GEO</span>
                                    </div>
                                    <div id="map-p1-inputs" class="flex flex-col gap-2"></div>
                                </div>
                                <div class="h-px bg-slate-200 dark:bg-white/5 my-2"></div>
                                <div class="space-y-2">
                                    <div class="flex items-center justify-between">
                                        <h3 class="text-[9px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest flex items-center">Point 2 (Target)</h3>
                                        <span class="text-[8px] text-slate-500 p-type-label uppercase font-black">GEO</span>
                                    </div>
                                    <div id="map-p2-inputs" class="flex flex-col gap-2"></div>
                                </div>
                            </div>
                            <button onclick="applySyncCoordinates()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-3.5 rounded-xl shadow-xl text-[10px] uppercase tracking-[0.2em] active:scale-95 transition-all mt-2">
                                Apply Sync
                            </button>
                        </div>
                    </div>
                </div>

                <!-- BOTTOM CENTER: Search Bar -->
                <div class="absolute bottom-6 left-4 right-4 md:left-1/2 md:transform md:-translate-x-1/2 md:w-[32rem] z-[100] pointer-events-none flex flex-col justify-end items-center">
                    <div class="w-full relative pointer-events-auto">
                        <!-- Search Results Dropdown (Opens UP) -->
                        <div id="search-results" class="hidden glass-panel absolute bottom-full left-0 right-0 mb-2 rounded-2xl border-slate-300 dark:border-white/10 shadow-2xl max-h-60 overflow-y-auto animate-fade-in flex-col-reverse"></div>
                        <!-- Search Input -->
                        <div class="glass-panel flex items-center p-1.5 rounded-2xl shadow-2xl border-slate-300 dark:border-white/20">
                            <div class="pl-4 text-slate-400 dark:text-slate-500"><i data-lucide="search" class="w-4 h-4"></i></div>
                            <input type="text" id="map-search-input" placeholder="Search address or location..." class="flex-1 bg-transparent border-none outline-none text-sm py-2.5 px-3 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500" onkeyup="handleSearchKeyUp(event)">
                            <button onclick="clearSearch()" id="clear-search-btn" class="hidden p-2 text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- View 2: SETTINGS -->
        <div id="standard-view-container" class="hidden absolute inset-0 w-full h-full flex items-center justify-center p-4 md:p-6 z-[200] overflow-y-auto">
            
            <div id="view-settings" class="view-section hidden flex-col w-full max-w-lg">
                <div class="glass-panel p-8 md:p-12 rounded-[3rem] space-y-8 shadow-2xl mt-12 md:mt-0">
                    <h3 class="text-xl md:text-2xl font-black text-slate-800 dark:text-white tracking-tight uppercase border-b border-slate-200 dark:border-white/5 pb-4">Settings</h3>
                    
                    <div class="space-y-6">
                        <div class="space-y-4">
                            <p class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Coordinate Format</p>
                            <div class="flex bg-slate-100 dark:bg-black/40 p-1.5 rounded-2xl border border-slate-200 dark:border-white/5 h-12 md:h-14 relative overflow-hidden">
                                <div id="settings-toggle-bg" class="absolute inset-y-1.5 left-1.5 w-[calc(50%-4px)] bg-white dark:bg-indigo-500/20 rounded-xl transition-transform duration-500 shadow-sm dark:shadow-none"></div>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="coord-pref" value="GEO" checked onchange="updateCoordPref()" class="peer sr-only"><span class="text-slate-500 peer-checked:text-indigo-600 dark:peer-checked:text-white uppercase transition-colors">GEO</span>
                                </label>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="coord-pref" value="UTM" onchange="updateCoordPref()" class="peer sr-only"><span class="text-slate-500 peer-checked:text-indigo-600 dark:peer-checked:text-white uppercase transition-colors">UTM</span>
                                </label>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <p class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase tracking-widest">Distance Units</p>
                            <div class="flex bg-slate-100 dark:bg-black/40 p-1.5 rounded-2xl border border-slate-200 dark:border-white/5 h-12 md:h-14 relative overflow-hidden">
                                <div id="units-toggle-bg" class="absolute inset-y-1.5 left-1.5 w-[calc(50%-4px)] bg-white dark:bg-indigo-500/20 rounded-xl transition-transform duration-500 shadow-sm dark:shadow-none"></div>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="unit-pref" value="METRIC" checked onchange="updateUnitPref()" class="peer sr-only"><span class="text-slate-500 peer-checked:text-indigo-600 dark:peer-checked:text-white uppercase transition-colors">Metric</span>
                                </label>
                                <label class="flex-1 text-center cursor-pointer relative z-10 flex items-center justify-center font-bold text-[10px] tracking-widest">
                                    <input type="radio" name="unit-pref" value="IMPERIAL" onchange="updateUnitPref()" class="peer sr-only"><span class="text-slate-500 peer-checked:text-indigo-600 dark:peer-checked:text-white uppercase transition-colors">Imperial</span>
                                </label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-4 md:p-6 bg-slate-100 dark:bg-black/40 rounded-[2rem] border border-slate-200 dark:border-white/5 shadow-inner">
                            <div class="flex items-center space-x-4">
                                <div class="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm dark:shadow-lg"><i data-lucide="moon" class="w-5 h-5 text-indigo-500 dark:text-slate-300"></i></div>
                                <div><p class="font-bold text-slate-800 dark:text-white text-sm">Dark Theme</p><p class="text-[10px] text-slate-500 mt-1 leading-none font-bold uppercase tracking-tighter">OLED Optimized</p></div>
                            </div>
                            <input type="checkbox" id="dark-mode-toggle" onchange="toggleTheme()" class="w-10 h-5" checked>
                        </div>
                        
                        <div class="h-px bg-slate-200 dark:bg-white/5 my-6"></div>

                        <div class="space-y-4">
                            <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Danger Zone</p>
                            <button onclick="promptFactoryReset()" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-600 dark:text-red-400 font-bold py-4 rounded-2xl transition-all shadow-inner border border-red-500/20 uppercase tracking-[0.2em] text-xs">
                                Reload / Reset App
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let sidebarOpen = false;
        let coordPref = 'GEO', unitPref = 'METRIC';
        let currentDist = 0, mapInit = false;
        let map, p1M = null, p2M = null, poly = null, points = [], searchM = null, userLocM = null;
        let currentLayerMode = 'map';

        // Engineering Calculation for FSPL
        function calculateFSPL(distanceMeters, frequencyMHz) {
            if (distanceMeters <= 0 || isNaN(distanceMeters) || isNaN(frequencyMHz)) return 0;
            const distanceKm = distanceMeters / 1000;
            return (20 * Math.log10(distanceKm) + 20 * Math.log10(frequencyMHz) + 32.44).toFixed(2);
        }

        // Circle Marker Generators
        function getCircleIcon(color, label) {
            return L.divIcon({
                className: '',
                html: `<div class="relative flex justify-center items-center"><div class="absolute -top-6 text-[9px] font-black text-white px-1.5 py-0.5 rounded-md shadow-lg border border-white/20 leading-none whitespace-nowrap" style="background-color: ${color};">${label}</div><div style="background-color: ${color}; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);"></div></div>`,
                iconAnchor: [7, 7]
            });
        }
        
        const m1I = getCircleIcon("#6366f1", "P1");
        const m2I = getCircleIcon("#10b981", "P2");

        // Hybrid Map Layers
        const mapLayerLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
        const mapLayerDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
        const satImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Imagery &copy; Esri' });
        const satLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}');
        const satLayerGroup = L.layerGroup([satImagery, satLabels]);
        let activeMapLayer = mapLayerDark;

        // Great Circle Math
        function getGreatCirclePoints(lat1, lon1, lat2, lon2, numPoints = 100) {
            const pts = []; const d2r = Math.PI / 180, r2d = 180 / Math.PI;
            const phi1 = lat1 * d2r, lambda1 = lon1 * d2r, phi2 = lat2 * d2r, lambda2 = lon2 * d2r;
            const u = Math.sin((phi2 - phi1) / 2), v = Math.sin((lambda2 - lambda1) / 2);
            const a = u * u + Math.cos(phi1) * Math.cos(phi2) * v * v;
            const d = 2 * Math.asin(Math.sqrt(a));
            if (d === 0) return [[lat1, lon1], [lat2, lon2]];
            for (let i = 0; i <= numPoints; i++) {
                const f = i / numPoints, A = Math.sin((1 - f) * d) / Math.sin(d), B = Math.sin(f * d) / Math.sin(d);
                const x = A * Math.cos(phi1) * Math.cos(lambda1) + B * Math.cos(phi2) * Math.cos(lambda2);
                const y = A * Math.cos(phi1) * Math.sin(lambda1) + B * Math.cos(phi2) * Math.sin(lambda2);
                const z = A * Math.sin(phi1) + B * Math.sin(phi2);
                const phi = Math.atan2(z, Math.sqrt(x * x + y * y)), lambda = Math.atan2(y, x);
                pts.push([phi * r2d, lambda * r2d]);
            }
            return pts;
        }

        // Draggable Functionality
        function makeDraggable(elmnt, header) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (header) { header.onmousedown = dragMouseDown; header.ontouchstart = dragMouseDown; }
            function dragMouseDown(e) {
                e = e || window.event;
                if(e.type === 'touchstart') { pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; }
                else { pos3 = e.clientX; pos4 = e.clientY; }
                document.onmouseup = closeDragElement; document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag; document.ontouchmove = elementDrag;
                elmnt.classList.add('is-dragging');
            }
            function elementDrag(e) {
                e = e || window.event; e.preventDefault();
                let cX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let cY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - cX; pos2 = pos4 - cY; pos3 = cX; pos4 = cY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null;
                elmnt.classList.remove('is-dragging');
            }
        }

        window.onload = function() {
            makeDraggable(document.getElementById("hud-point-panels"), document.getElementById("drag-handle-inspector"));
            makeDraggable(document.getElementById("map-result-box"), document.getElementById("drag-handle-results"));
        };

        function hideModal() { 
            const custModal = document.getElementById('custom-modal');
            if (custModal) custModal.style.display = 'none';
        }
        
        function promptClearMap() {
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const iconBgEl = document.getElementById('modal-icon-bg');
            const iconEl = document.getElementById('modal-icon');
            const btn = document.getElementById('modal-confirm');
            
            if (titleEl) titleEl.innerText = 'Reset Map Tool?';
            if (descEl) descEl.innerText = 'Clear the map and start a new spatial analysis?';
            if (iconBgEl) iconBgEl.className = 'w-16 h-16 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto border border-indigo-500/20';
            if (iconEl) {
                iconEl.className = 'w-8 h-8 text-indigo-600 dark:text-indigo-400';
                iconEl.setAttribute('data-lucide', 'help-circle');
            }
            
            if (btn) {
                btn.innerText = 'Reset';
                btn.className = 'flex-1 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-bold uppercase tracking-widest shadow-lg transition-all';
                btn.onclick = () => { clearMapLogic(); hideModal(); };
            }
            
            const custModal = document.getElementById('custom-modal');
            if (custModal) custModal.style.display = 'flex';
            lucide.createIcons();
        }

        function promptFactoryReset() {
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const iconBgEl = document.getElementById('modal-icon-bg');
            const iconEl = document.getElementById('modal-icon');
            const btn = document.getElementById('modal-confirm');
            
            if (titleEl) titleEl.innerText = 'Reload App?';
            if (descEl) descEl.innerText = 'This will reload the app and restore all default settings. Are you sure?';
            if (iconBgEl) iconBgEl.className = 'w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto border border-red-500/20';
            if (iconEl) {
                iconEl.className = 'w-8 h-8 text-red-500';
                iconEl.setAttribute('data-lucide', 'alert-triangle');
            }
            
            if (btn) {
                btn.innerText = 'Reload';
                btn.className = 'flex-1 py-3 rounded-2xl bg-red-600 hover:bg-red-500 text-white text-[10px] font-bold uppercase tracking-widest shadow-lg transition-all';
                btn.onclick = () => { location.reload(); };
            }
            
            const custModal = document.getElementById('custom-modal');
            if (custModal) custModal.style.display = 'flex';
            lucide.createIcons();
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar'), o = document.getElementById('sidebar-overlay'), i = document.getElementById('menu-icon');
            sidebarOpen = !sidebarOpen;
            s.classList.toggle('sidebar-collapsed', !sidebarOpen);
            o.classList.toggle('active', sidebarOpen);
            i.setAttribute('data-lucide', sidebarOpen ? 'x' : 'menu');
            lucide.createIcons();
        }

        function showToast(m, t='success') {
            const c = document.getElementById('toast-container'), el = document.createElement('div');
            el.className = `${t === 'error' ? 'bg-red-500/90' : (t === 'info' ? 'bg-orange-500/90' : 'bg-indigo-600/90')} backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center space-x-3 animate-toast-in border border-white/20`;
            let iconStr = t === 'error' ? 'alert-circle' : (t === 'info' ? 'anchor' : 'check-circle-2');
            el.innerHTML = `<i data-lucide="${iconStr}" class="w-4 h-4"></i><span class="font-bold text-[10px] uppercase tracking-widest text-white">${m}</span>`;
            c.appendChild(el); lucide.createIcons({root: el});
            setTimeout(() => el.remove(), 2500);
        }

        function switchView(v) {
            if (sidebarOpen) toggleSidebar();
            document.querySelectorAll('.view-section').forEach(e => { e.classList.add('hidden'); e.classList.remove('flex'); });
            const sc = document.getElementById('standard-view-container');
            
            if (v === 'map') {
                sc.classList.add('hidden');
                document.getElementById('view-map').classList.remove('hidden');
                document.getElementById('view-map').classList.add('flex');
                if (map) setTimeout(() => map.invalidateSize(), 300);
            } else {
                sc.classList.remove('hidden');
                const t = document.getElementById(`view-${v}`);
                if (t) { t.classList.remove('hidden'); t.classList.add('flex'); }
            }

            document.querySelectorAll('.nav-btn').forEach(e => {
                e.classList.remove('bg-indigo-500/10', 'dark:bg-indigo-500/20', 'text-indigo-700', 'dark:text-white', 'shadow-inner');
                e.classList.add('text-slate-600', 'dark:text-slate-400');
            });
            const b = document.getElementById(`nav-btn-${v}`);
            if(b) { 
                b.classList.remove('text-slate-600', 'dark:text-slate-400'); 
                b.classList.add('bg-indigo-500/10', 'dark:bg-indigo-500/20', 'text-indigo-700', 'dark:text-white', 'shadow-inner'); 
            }
            if (v === 'map' && !mapInit) { initMap(); mapInit = true; }
        }

        // --- THEME ---
        function toggleTheme() { 
            const html = document.documentElement;
            html.classList.toggle('dark'); 
            const isDark = html.classList.contains('dark');
            
            if(map && currentLayerMode === 'map') {
                map.removeLayer(activeMapLayer);
                activeMapLayer = isDark ? mapLayerDark : mapLayerLight;
                activeMapLayer.addTo(map);
            }
        }

        // --- SEARCH ---
        let sT;
        function handleSearchKeyUp(e) {
            const v = e.target.value.trim();
            document.getElementById('clear-search-btn').classList.toggle('hidden', v.length === 0);
            if (e.key === 'Enter') searchPlaces(v); else { clearTimeout(sT); sT = setTimeout(() => searchPlaces(v), 700); }
        }
        function clearSearch() {
            document.getElementById('map-search-input').value = '';
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('clear-search-btn').classList.add('hidden');
            if (searchM) map.removeLayer(searchM);
        }
        async function searchPlaces(q) {
            if (q.length < 3) { document.getElementById('search-results').classList.add('hidden'); return; }
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`);
                const d = await r.json();
                const c = document.getElementById('search-results');
                if (!d || d.length === 0) { c.classList.add('hidden'); return; }
                c.innerHTML = d.map(x => `
                    <div class="px-5 py-4 hover:bg-slate-100 dark:hover:bg-white/10 border-b border-slate-200 dark:border-white/5 last:border-none transition-colors flex justify-between items-center">
                        <div class="cursor-pointer flex-1 overflow-hidden pr-2" onclick="goTo(${x.lat}, ${x.lon}, '${x.display_name.replace(/'/g, "\\'")}')">
                            <p class="text-xs font-black text-slate-800 dark:text-white truncate uppercase tracking-tighter">${x.display_name.split(',')[0]}</p>
                            <p class="text-[9px] text-slate-500 dark:text-slate-400 truncate uppercase">${x.display_name.split(',').slice(1).join(',')}</p>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="setPointExplicit(1, ${x.lat}, ${x.lon}); clearSearch();" class="bg-indigo-600 text-white px-2 py-1.5 rounded-lg text-[9px] font-bold uppercase transition-all active:scale-95">Set P1</button>
                            <button onclick="setPointExplicit(2, ${x.lat}, ${x.lon}); clearSearch();" class="bg-emerald-500 text-white px-2 py-1.5 rounded-lg text-[9px] font-bold uppercase transition-all active:scale-95">Set P2</button>
                        </div>
                    </div>`).join('');
                c.classList.remove('hidden');
            } catch (err) {}
        }
        function goTo(la, lo, n) {
            map.setView([la, lo], 15);
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('map-search-input').value = n.split(',')[0];
            if (searchM) map.removeLayer(searchM);
            searchM = L.circleMarker([la, lo], { radius: 12, color: '#818cf8', fillColor: '#818cf8', fillOpacity: 0.4 }).addTo(map);
            setTimeout(() => { if(searchM) map.removeLayer(searchM); }, 4000);
        }

        // --- MAP TOOLS ---
        function toggleMapLayer() {
            const icon = document.getElementById('layer-icon');
            if (currentLayerMode === 'map') {
                map.removeLayer(activeMapLayer); satLayerGroup.addTo(map);
                document.getElementById('map').classList.remove('dark-theme');
                document.getElementById('hud-toggle-layer').classList.add('active');
                icon.setAttribute('data-lucide', 'map');
                currentLayerMode = 'sat'; showToast('Satellite Active');
            } else {
                map.removeLayer(satLayerGroup); activeMapLayer.addTo(map);
                if(document.documentElement.classList.contains('dark')) document.getElementById('map').classList.add('dark-theme');
                document.getElementById('hud-toggle-layer').classList.remove('active');
                icon.setAttribute('data-lucide', 'satellite');
                currentLayerMode = 'map'; showToast('Map Active');
            }
            lucide.createIcons();
        }

        function locateUser() {
            showToast('Acquiring location...', 'success');
            map.locate({setView: true, maxZoom: 15});
            map.once('locationfound', function(e) {
                if (userLocM) map.removeLayer(userLocM);
                userLocM = L.circleMarker(e.latlng, { radius: 8, fillColor: '#3b82f6', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(map);
                showToast('Location Acquired');
            });
            map.once('locationerror', function(e) { showToast('GPS Denied or Unavailable', 'error'); });
        }

        function toggleCoordinateHUD() {
            const h = document.getElementById('hud-point-panels');
            const v = !h.classList.contains('hidden');
            h.classList.toggle('hidden', v);
            
            const btn = document.getElementById('hud-toggle-inspect');
            if(!v) btn.classList.add('active'); else btn.classList.remove('active');
        }

        function toggleBandSelector() {
            const p = document.getElementById('band-selector-panel');
            const btn = document.getElementById('hud-toggle-band');
            p.classList.toggle('hidden');
            if(!p.classList.contains('hidden')) btn.classList.add('active'); else btn.classList.remove('active');
        }

        function updateCoordPref() {
            coordPref = document.querySelector('input[name="coord-pref"]:checked').value;
            const b = document.getElementById('settings-toggle-bg');
            if(b) b.style.transform = coordPref === 'GEO' ? 'translateX(0)' : 'translateX(100%)';
            document.querySelectorAll('.p-type-label').forEach(el => el.innerText = coordPref);
            const p1c = document.getElementById('map-p1-inputs'), p2c = document.getElementById('map-p2-inputs');
            if (coordPref === 'GEO') {
                p1c.innerHTML = `<input type="number" id="p1-lat" oninput="applySyncCoordinates(1)" placeholder="Latitude" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"><input type="number" id="p1-lon" oninput="applySyncCoordinates(1)" placeholder="Longitude" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase">`;
                p2c.innerHTML = `<input type="number" id="p2-lat" oninput="applySyncCoordinates(2)" placeholder="Latitude" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"><input type="number" id="p2-lon" oninput="applySyncCoordinates(2)" placeholder="Longitude" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase">`;
            } else {
                p1c.innerHTML = `<input type="text" id="p1-zone" oninput="applySyncCoordinates(1)" placeholder="Zone" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"><div class="grid grid-cols-2 gap-2"><input type="number" id="p1-east" oninput="applySyncCoordinates(1)" placeholder="E" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"><input type="number" id="p1-north" oninput="applySyncCoordinates(1)" placeholder="N" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"></div>`;
                p2c.innerHTML = `<input type="text" id="p2-zone" oninput="applySyncCoordinates(2)" placeholder="Zone" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"><div class="grid grid-cols-2 gap-2"><input type="number" id="p2-east" oninput="applySyncCoordinates(2)" placeholder="E" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"><input type="number" id="p2-north" oninput="applySyncCoordinates(2)" placeholder="N" class="input-sleek px-4 py-2.5 rounded-xl md:rounded-2xl text-xs uppercase"></div>`;
            }
            if (points.length > 0) rHUD();
        }

        function updateUnitPref() {
            unitPref = document.querySelector('input[name="unit-pref"]:checked').value;
            const b = document.getElementById('units-toggle-bg');
            if(b) b.style.transform = unitPref === 'METRIC' ? 'translateX(0)' : 'translateX(100%)';
            if (points.length === 2 && points[0] && points[1]) calculateMapDistance();
        }

        function swapPoints() {
            if (points.length < 2 || !points[0] || !points[1]) { showToast('Need 2 points to swap', 'error'); return; }
            const temp = points[0]; points[0] = points[1]; points[1] = temp;
            if(p1M) map.removeLayer(p1M); if(p2M) map.removeLayer(p2M);
            
            p1M = createMarker(points[0].lat, points[0].lng, m1I, 1);
            p2M = createMarker(points[1].lat, points[1].lng, m2I, 2);
            
            rVec(); rHUD(); showToast('Direction Swapped');
        }

        function applySyncCoordinates() {
            if(getC(1)) {
                points[0] = getC(1);
                if(p1M) map.removeLayer(p1M);
                p1M = createMarker(points[0].lat, points[0].lng, m1I, 1);
            }
            if(getC(2)) {
                points[1] = getC(2);
                if(p2M) map.removeLayer(p2M);
                p2M = createMarker(points[1].lat, points[1].lng, m2I, 2);
            }
            if (points.length === 2 && points[0] && points[1]) {
                rVec();
                map.fitBounds(poly.getBounds(), {padding: [100, 100]});
            }
        }

        function getC(n) {
            if (coordPref === 'GEO') {
                const la = parseFloat(document.getElementById(`p${n}-lat`).value), lo = parseFloat(document.getElementById(`p${n}-lon`).value);
                return (!isNaN(la) && !isNaN(lo)) ? {lat: la, lng: lo} : null;
            } else {
                const zi = document.getElementById(`p${n}-zone`); if(!zi) return null;
                const z = zi.value.toUpperCase().trim(), e = parseFloat(document.getElementById(`p${n}-east`).value), na = parseFloat(document.getElementById(`p${n}-north`).value);
                if (!z || isNaN(e) || isNaN(na)) return null;
                try {
                    const zN = parseInt(z.match(/\d+/)[0]), iN = !z.includes('S'), p = `+proj=utm +zone=${zN} ${iN ? '' : '+south '}+datum=WGS84 +units=m +no_defs`;
                    proj4.defs(`EPSG:UTM${zN}`, p); const g = proj4(p, 'EPSG:4326', [e, na]);
                    return {lat: g[1], lng: g[0]};
                } catch(err) { return null; }
            }
        }

        function rHUD() {
            points.forEach((p, i) => {
                if(!p) return;
                const n = i+1;
                if (coordPref === 'GEO') {
                    const la = document.getElementById(`p${n}-lat`);
                    const lo = document.getElementById(`p${n}-lon`);
                    if(la) la.value = p.lat.toFixed(6); 
                    if(lo) lo.value = p.lng.toFixed(6);
                } else {
                    const z = Math.floor((p.lng + 180) / 6) + 1, isN = p.lat >= 0, pStr = `+proj=utm +zone=${z} ${isN ? '' : '+south '}+datum=WGS84 +units=m +no_defs`;
                    proj4.defs(`EPSG:326${z}`, pStr); const u = proj4('EPSG:4326', pStr, [p.lng, p.lat]);
                    const ze = document.getElementById(`p${n}-zone`);
                    const ee = document.getElementById(`p${n}-east`);
                    const ne = document.getElementById(`p${n}-north`);
                    if(ze) ze.value = `${z}${isN ? 'N' : 'S'}`; 
                    if(ee) ee.value = u[0].toFixed(2); 
                    if(ne) ne.value = u[1].toFixed(2);
                }
            });
        }

        function rVec() {
            if (poly) map.removeLayer(poly);
            if (!points[0] || !points[1]) return;
            const greatCirclePoints = getGreatCirclePoints(points[0].lat, points[0].lng, points[1].lat, points[1].lng);
            poly = L.polyline(greatCirclePoints, {color: '#818cf8', weight: 4, dashArray: '10, 10', className: 'flowing-line'}).addTo(map);
            calculateMapDistance();
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([32.0853, 34.7818], 12);
            activeMapLayer.addTo(map);
            map.on('click', onMapClick); 
            map.on('mousedown', () => document.getElementById('search-results').classList.add('hidden'));
            updateCoordPref();
            updateUnitPref();
        }

        // --- MAP CLICK LOGIC ---
        function onMapClick(e) {
            if (!points[0]) {
                // Drop Origin (P1)
                points[0] = {lat: e.latlng.lat, lng: e.latlng.lng};
                p1M = createMarker(e.latlng.lat, e.latlng.lng, m1I, 1);
            } else if (!points[1]) {
                // Drop Target (P2)
                points[1] = {lat: e.latlng.lat, lng: e.latlng.lng};
                p2M = createMarker(e.latlng.lat, e.latlng.lng, m2I, 2);
                rVec(); 
                map.fitBounds(poly.getBounds(), {padding: [100, 100]});
            } else {
                // Rapid Scanning: Move Target (P2) instantly on subsequent clicks
                points[1] = {lat: e.latlng.lat, lng: e.latlng.lng};
                p2M.setLatLng(e.latlng);
                rVec();
            }
            rHUD();
        }

        function createMarker(lat, lng, icon, n) {
            const m = L.marker([lat, lng], {icon: icon, draggable: true}).addTo(map);
            m.on('drag', function(e) {
                const pos = e.target.getLatLng();
                points[n-1] = {lat: pos.lat, lng: pos.lng};
                if (points.length === 2 && points[0] && points[1]) rVec();
                rHUD();
            });
            return m;
        }

        function setPointExplicit(n, la, lo) {
            points[n-1] = {lat: la, lng: lo};
            const iconToUse = n === 1 ? m1I : m2I;
            
            if (n === 1) {
                if (p1M) map.removeLayer(p1M);
                p1M = createMarker(la, lo, iconToUse, 1);
            } else {
                if (p2M) map.removeLayer(p2M);
                p2M = createMarker(la, lo, iconToUse, 2);
            }
            
            if (points.length === 2 && points[0] && points[1]) rVec();
            rHUD();
            map.closePopup();
            showToast(`Point ${n} Set`);
            switchView('map');
        }

        function clearMapLogic() {
            points = [];
            if(p1M) { map.removeLayer(p1M); p1M = null; }
            if(p2M) { map.removeLayer(p2M); p2M = null; }
            if(poly) { map.removeLayer(poly); poly = null; }
            document.getElementById('map-result-box').classList.add('hidden');
            clearHUDInputs(1); clearHUDInputs(2);
            showToast('Map Reset');
        }

        function clearHUDInputs(n) {
            [`p${n}-lat`, `p${n}-lon`, `p${n}-zone`, `p${n}-east`, `p${n}-north`].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = '';
            });
        }

        function calculateMapDistance() {
            if (points.length < 2 || !points[0] || !points[1]) return;
            const R = 6371e3, f1 = points[0].lat * Math.PI/180, f2 = points[1].lat * Math.PI/180;
            const df = (points[1].lat-points[0].lat) * Math.PI/180, dl = (points[1].lng-points[0].lng) * Math.PI/180;
            
            // Distance
            const a = Math.sin(df/2) * Math.sin(df/2) + Math.cos(f1) * Math.cos(f2) * Math.sin(dl/2) * Math.sin(dl/2);
            currentDist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            
            // Forward Azimuth
            const y = Math.sin(dl) * Math.cos(f2);
            const x = Math.cos(f1) * Math.sin(f2) - Math.sin(f1) * Math.cos(f2) * Math.cos(dl);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            let b = (brng + 360) % 360;

            // Reverse Azimuth
            const revY = Math.sin(-dl) * Math.cos(f1);
            const revX = Math.cos(f2) * Math.sin(f1) - Math.sin(f2) * Math.cos(f1) * Math.cos(-dl);
            let revBrng = Math.atan2(revY, revX) * 180 / Math.PI;
            let revB = (revBrng + 360) % 360;
            
            let displayStr = "";
            if (unitPref === 'METRIC') {
                displayStr = currentDist > 1000 ? (currentDist/1000).toFixed(2) + ' km' : currentDist.toFixed(0) + ' m';
            } else {
                let distFt = currentDist * 3.28084;
                displayStr = distFt > 5280 ? (distFt/5280).toFixed(2) + ' mi' : distFt.toFixed(0) + ' ft';
            }

            document.getElementById('map-dist-res').innerText = displayStr;
            document.getElementById('map-az-res').innerHTML = `Fwd: ${b.toFixed(1)}°<br><span class="text-[10px] text-slate-500 dark:text-slate-400">Rev: ${revB.toFixed(1)}°</span>`;
            document.getElementById('map-result-box').classList.remove('hidden'); document.getElementById('map-result-box').classList.add('flex');
            updateMapFSPL();
        }

        function updateMapFSPL() {
            if (currentDist === 0) return;
            const select = document.getElementById('map-band-select');
            const f = parseFloat(select.value);
            const textContent = select.options[select.selectedIndex].text.split('(')[0].trim();
            const display = document.getElementById('current-band-display');
            if (display) display.innerText = `(${textContent})`;
            
            const fspl = calculateFSPL(currentDist, f);
            document.getElementById('map-fspl-res').innerText = fspl + ' dB';
        }

        switchView('map');
    </script>
</body>
</html>
